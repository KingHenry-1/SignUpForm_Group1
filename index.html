<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <form class="login-box">

        <h1>LOGIN FORM</h1>

        <!-- email/mobile input -->
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" placeholder="Mobile/Email">
        </div>

        <!-- password input -->
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Password">
        </div>

        <a href="#" class="forgot-link">Forgot Password?</a>

        <button class="login-btn">Login</button>

        <!-- other login options -->
        <p class="or-text">or login with</p>

        <div class="social-buttons">
            <button class="facebook-btn"><i class="fa-brands fa-facebook-f"></i> Facebook</button>
            <button class="instagram-btn"><i class="fa-brands fa-instagram"></i> Instagram</button>
        </div>

        <!-- signup option -->
        <p class="signup-text">Don't have an account? <a href="#">Sign up</a></p>

    </form>

</body>
</html>
